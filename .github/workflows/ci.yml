name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e backend pytest
      - name: Test backend
        run: pytest -q
      - name: Benchmark gate
        run: |
          navigation-analyzer benchmark \
            --bag examples/nav2_sim_success_003/navigation_run.json \
            --config config/default.yaml \
            --thresholds config/benchmark_nav2.yaml \
            --report outputs/benchmark_nav2.md \
            --out outputs/benchmark_nav2.json \
            --fail-on-regression
      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-artifacts
          path: outputs/benchmark_nav2.*

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  action-selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Analyze success_clean (expect pass)
        id: pass_case
        uses: ./
        with:
          bag: examples/zoo/success_clean/navigation_run.json
          output-dir: outputs/action-selftest/success_clean

      - name: Verify pass case outputs
        run: |
          set -e
          test "${{ steps.pass_case.outputs.passed }}" = "true"
          test -z "${{ steps.pass_case.outputs.primary-failure }}"
          test -f outputs/action-selftest/success_clean/diagnosis.md
          test -f outputs/action-selftest/success_clean/diagnosis_pack.json

      - name: Analyze oscillation_near_goal (gate disabled)
        id: fail_case
        uses: ./
        with:
          bag: examples/zoo/oscillation_near_goal/navigation_run.json
          output-dir: outputs/action-selftest/oscillation
          fail-on-regression: "false"

      - name: Verify fail case outputs
        run: |
          set -e
          test "${{ steps.fail_case.outputs.passed }}" = "false"
          test "${{ steps.fail_case.outputs.primary-failure }}" = "oscillation"
          test "${{ steps.fail_case.outputs.failure-count }}" = "1"

      - name: Analyze oscillation_near_goal (gate enabled, expect failure)
        id: gate_case
        uses: ./
        continue-on-error: true
        with:
          bag: examples/zoo/oscillation_near_goal/navigation_run.json
          output-dir: outputs/action-selftest/oscillation-gated
          fail-on-regression: "true"

      - name: Verify gated step failed
        run: |
          set -e
          test "${{ steps.gate_case.outcome }}" = "failure"
