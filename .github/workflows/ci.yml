name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e backend pytest
      - name: Test backend
        run: pytest -q
      - name: Benchmark gate
        run: |
          navigation-analyzer benchmark \
            --bag examples/nav2_sim_success_003/navigation_run.json \
            --config config/default.yaml \
            --thresholds config/benchmark_nav2.yaml \
            --report outputs/benchmark_nav2.md \
            --out outputs/benchmark_nav2.json \
            --fail-on-regression
      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-artifacts
          path: outputs/benchmark_nav2.*

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
